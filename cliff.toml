# git-cliff configuration for changelog generation
# https://git-cliff.org

[changelog]
# Template for the changelog header
header = """
# Changelog\n
"""

# Template for the changelog body
# NOTE: For Play Store changelogs (500 char limit), use compact format
# For full changelogs, use the detailed format below
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
            {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""

# Template for the changelog footer
# NOTE: Removed for Play Store to save characters (footer wastes ~50 chars)
footer = ""

# Remove leading/trailing whitespace from the template
trim = true

[git]
# Parse conventional commits
conventional_commits = true
filter_unconventional = true
split_commits = false

# Process commits in chronological order
commit_parsers = [
    { message = "^feat", group = "✨ Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^doc", group = "📚 Documentation" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = "♻️ Refactoring" },
    { message = "^style", group = "🎨 Styling" },
    { message = "^test", group = "🧪 Testing" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps\\)", skip = true },
    { message = "^chore", group = "🔧 Miscellaneous" },
    { message = "^ci", group = "👷 CI/CD" },
    { body = ".*security", group = "🔒 Security" },
]

# Filter out certain commits
filter_commits = false

# Tag pattern for releases
tag_pattern = "v[0-9].*"

# Sort commits by newest first
sort_commits = "newest"

