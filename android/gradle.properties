org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Use Java 17 for Android Gradle Plugin 8.x+
# This fixes the "Android Gradle plugin requires Java 17" error
#
# To fix locally:
# 1. Install Java 17: brew install openjdk@17
# 2. Link it: sudo ln -sfn /opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk /Library/Java/JavaVirtualMachines/openjdk-17.jdk
# 3. Uncomment the line below and set the path:
# org.gradle.java.home=/Library/Java/JavaVirtualMachines/openjdk-17.jdk/Contents/Home
#
# Note: CI/CD uses Java 17 automatically, so this only affects local builds
