name: Update Store Listing

on:
  workflow_dispatch:
    inputs:
      update_screenshots:
        description: 'Update screenshots'
        required: false
        default: 'false'
        type: boolean
      update_metadata:
        description: 'Update metadata (descriptions, title)'
        required: false
        default: 'true'
        type: boolean

jobs:
  update-listing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install fastlane
        run: gem install fastlane

      - name: Create service account file
        env:
          PLAY_STORE_CREDENTIALS: ${{ secrets.PLAY_STORE_CREDENTIALS }}
        run: |
          echo "$PLAY_STORE_CREDENTIALS" > play-store-credentials.json

      - name: Update store metadata
        if: ${{ inputs.update_metadata }}
        run: |
          fastlane supply \
            --json_key play-store-credentials.json \
            --package_name com.invtracker.inv_tracker \
            --metadata_path fastlane/metadata/android \
            --skip_upload_apk \
            --skip_upload_aab \
            --skip_upload_images \
            --skip_upload_screenshots

      - name: Update screenshots
        if: ${{ inputs.update_screenshots }}
        run: |
          fastlane supply \
            --json_key play-store-credentials.json \
            --package_name com.invtracker.inv_tracker \
            --metadata_path fastlane/metadata/android \
            --skip_upload_apk \
            --skip_upload_aab \
            --skip_upload_metadata

      - name: Cleanup
        if: always()
        run: rm -f play-store-credentials.json

