name: "CD: Promote to Production"

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code to promote (leave empty for latest alpha release)'
        required: false
        type: string
      rollout_percentage:
        description: 'Initial rollout percentage (10, 20, 50, 100)'
        required: true
        type: choice
        default: '20'
        options:
          - '10'
          - '20'
          - '50'
          - '100'
      update_priority:
        description: 'In-app update priority (0-5, higher = more urgent)'
        required: true
        type: choice
        default: '2'
        options:
          - '0'
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: promote-production
  cancel-in-progress: false  # Don't cancel production promotions

jobs:
  promote-to-production:
    runs-on: self-hosted
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js for Google Play API
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Promote Alpha to Production
        id: promote
        run: |
          npm install googleapis@140

          node << 'EOF'
          const { google } = require('googleapis');

          (async () => {
            try {
              // Authenticate with service account
              const serviceAccount = JSON.parse(process.env.PLAY_STORE_CREDENTIALS);
              const auth = new google.auth.GoogleAuth({
                credentials: serviceAccount,
                scopes: ['https://www.googleapis.com/auth/androidpublisher'],
              });

              const androidPublisher = google.androidpublisher({
                version: 'v3',
                auth: auth,
              });

              const packageName = 'com.invtracker.inv_tracker';
              const rolloutPercent = parseInt(process.env.ROLLOUT_PERCENTAGE);
              const updatePriority = parseInt(process.env.UPDATE_PRIORITY);

              console.log('🚀 Promoting alpha track to production...');
              console.log('   Package:', packageName);
              console.log('   Rollout:', rolloutPercent + '%');
              console.log('   Update Priority:', updatePriority);

              // Create edit
              const editResponse = await androidPublisher.edits.insert({
                packageName: packageName,
              });

              const editId = editResponse.data.id;
              console.log('✓ Created edit:', editId);

              // Get the latest release from alpha track
              const alphaTrack = await androidPublisher.edits.tracks.get({
                packageName: packageName,
                editId: editId,
                track: 'alpha',
              });

              const latestAlphaRelease = alphaTrack.data.releases?.[0];
              if (!latestAlphaRelease) {
                throw new Error('No releases found in alpha track');
              }

              console.log('✓ Found alpha release:');
              console.log('   Version codes:', latestAlphaRelease.versionCodes);
              console.log('   Name:', latestAlphaRelease.name);

              // Create production release
              const productionRelease = {
                versionCodes: latestAlphaRelease.versionCodes,
                status: rolloutPercent === 100 ? 'completed' : 'inProgress',
                inAppUpdatePriority: updatePriority,
              };

              // Add user fraction for gradual rollout
              if (rolloutPercent < 100) {
                productionRelease.userFraction = rolloutPercent / 100;
              }

              // Update production track
              await androidPublisher.edits.tracks.update({
                packageName: packageName,
                editId: editId,
                track: 'production',
                requestBody: {
                  track: 'production',
                  releases: [productionRelease],
                },
              });

              console.log('✓ Updated production track');

              // Commit the edit
              await androidPublisher.edits.commit({
                packageName: packageName,
                editId: editId,
              });

              console.log('✅ Successfully promoted to production!');

            } catch (error) {
              console.error('❌ Promotion failed:', error.message);
              if (error.response?.data) {
                console.error('API Error:', JSON.stringify(error.response.data, null, 2));
              }
              process.exit(1);
            }
          })();
          EOF
        env:
          PLAY_STORE_CREDENTIALS: ${{ secrets.PLAY_STORE_CREDENTIALS }}
          ROLLOUT_PERCENTAGE: ${{ inputs.rollout_percentage }}
          UPDATE_PRIORITY: ${{ inputs.update_priority }}

      - name: Update Firestore - Mark as Released
        if: success()
        run: |
          npm install firebase-admin
          
          node << 'EOF'
          const admin = require('firebase-admin');
          
          // Initialize Firebase Admin
          const serviceAccount = JSON.parse(process.env.FIREBASE_CREDENTIALS);
          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount)
          });
          
          const db = admin.firestore();
          
          (async () => {
            try {
              // Get current version info
              const versionDoc = await db.collection('app_config').doc('version_info').get();
              const versionData = versionDoc.data();
              
              console.log('📦 Current version info:', versionData);
              
              // Update to mark as released to production
              await db.collection('app_config').doc('version_info').update({
                pendingRelease: false,
                releaseDate: admin.firestore.Timestamp.now(),
                rolloutPercentage: parseInt(process.env.ROLLOUT_PERCENTAGE),
                lastPromotedVersion: versionData.pendingVersion,
                lastPromotedBuildNumber: versionData.pendingBuildNumber,
              });
              
              console.log('✅ Firestore updated successfully!');
              console.log('   Release Date:', new Date().toISOString());
              console.log('   Rollout:', process.env.ROLLOUT_PERCENTAGE + '%');
              
            } catch (error) {
              console.error('❌ Firestore update failed:', error);
              process.exit(1);
            }
          })();
          EOF
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          ROLLOUT_PERCENTAGE: ${{ inputs.rollout_percentage }}

      - name: Get version info for notification
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          BUILD=$(grep 'version:' pubspec.yaml | sed 's/.*+//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT

      - name: Notify Slack - Success
        if: success() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 Production Release: v${{ steps.version.outputs.version }} Live!",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Track:*\nProduction"},
                    {"type": "mrkdwn", "text": "*Rollout:*\n${{ inputs.rollout_percentage }}%"},
                    {"type": "mrkdwn", "text": "*Version:*\nv${{ steps.version.outputs.version }} (build ${{ steps.version.outputs.build }})"},
                    {"type": "mrkdwn", "text": "*Update Priority:*\n${{ inputs.update_priority }}/5"}
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "📊 Monitor rollout in <https://play.google.com/console|Play Console>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: Notify Slack - Failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ Production Promotion Failed",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Failed to promote alpha to production. Check <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|workflow logs>."
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
