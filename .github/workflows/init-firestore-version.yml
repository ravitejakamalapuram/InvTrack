name: "Init: Firestore Version Info"

on:
  workflow_dispatch:
    inputs:
      initial_version:
        description: 'Initial version (e.g., 3.54.17)'
        required: true
        type: string
      initial_build_number:
        description: 'Initial build number (e.g., 161)'
        required: true
        type: string
      force_overwrite:
        description: 'Force overwrite existing document (use with caution)'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: firestore-version-info
  cancel-in-progress: true

jobs:
  initialize:
    runs-on: self-hosted
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Firebase Admin SDK
        run: |
          echo "📦 Setting up Firebase Admin SDK..."
          SYSTEM_NODE_MODULES="/opt/homebrew/lib/node_modules"

          if [ -d "$SYSTEM_NODE_MODULES/firebase-admin" ]; then
            echo "✅ Using system globally installed firebase-admin"
            echo "NODE_PATH=$SYSTEM_NODE_MODULES" >> $GITHUB_ENV
            exit 0
          fi

          echo "❌ firebase-admin not found"
          echo "Run: npm install -g firebase-admin"
          exit 1

      - name: Initialize Firestore Document
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          INITIAL_VERSION: ${{ inputs.initial_version }}
          INITIAL_BUILD: ${{ inputs.initial_build_number }}
          FORCE_OVERWRITE: ${{ inputs.force_overwrite }}
        run: |
          node << 'EOF'
          const admin = require('firebase-admin');

          async function initializeFirestore() {
            try {
              const serviceAccount = JSON.parse(process.env.FIREBASE_CREDENTIALS);
              admin.initializeApp({
                credential: admin.credential.cert(serviceAccount)
              });

              const db = admin.firestore();
              const version = process.env.INITIAL_VERSION;
              const buildNumber = Number.parseInt(process.env.INITIAL_BUILD, 10);

              // Validate build number
              if (!Number.isInteger(buildNumber) || buildNumber <= 0) {
                console.error('❌ Invalid initial_build_number!');
                console.error(`   Got: "${process.env.INITIAL_BUILD}"`);
                console.error('   Expected: Positive integer (e.g., 161)');
                process.exit(1);
              }

              const forceOverwrite = process.env.FORCE_OVERWRITE === 'true';
              const now = new Date().toISOString();

              console.log('🔧 Initializing Firestore version_info document...');
              console.log('   Version:', version);
              console.log('   Build Number:', buildNumber);
              console.log('   Force Overwrite:', forceOverwrite);

              // Check if document already exists
              const existingDoc = await db.collection('app_config').doc('version_info').get();

              if (existingDoc.exists && !forceOverwrite) {
                console.log('⚠️  Document already exists!');
                const existingData = existingDoc.data();
                console.log('   Current data:', JSON.stringify(existingData, null, 2));
                console.log('');

                // Validate schema - check for missing required fields
                const requiredFields = [
                  'latestVersion', 'latestBuildNumber', 'minimumVersion', 'minimumBuildNumber',
                  'forceUpdate', 'updateMessage', 'whatsNew', 'downloadUrl', 'releaseDate',
                  'lastApprovedAt', 'createdAt', 'updatedAt'
                ];
                const missingFields = requiredFields.filter(field => !(field in existingData));

                if (missingFields.length > 0) {
                  console.log('❌ Document exists but has missing required fields!');
                  console.log('   Missing fields:', missingFields.join(', '));
                  console.log('');
                  console.log('💡 This document was likely auto-created by cd-deploy-android.yml');
                  console.log('   with placeholder values and needs proper initialization.');
                  console.log('');
                  console.log('🔧 To fix, re-run this workflow and check the "Force overwrite" checkbox');
                  process.exit(1);
                }

                console.log('✅ Document schema is valid!');
                console.log('❌ Cannot overwrite without force_overwrite=true');
                console.log('💡 To overwrite, re-run this workflow and check the "Force overwrite" checkbox');
                process.exit(1);
              }

              if (existingDoc.exists && forceOverwrite) {
                console.log('⚠️  Document exists but force_overwrite=true - will overwrite!');
              }

              // Create initial document
              const initialData = {
                // Core version info (required by app)
                latestVersion: version,
                latestBuildNumber: buildNumber,
                minimumVersion: version,
                minimumBuildNumber: buildNumber,
                forceUpdate: false,
                updateMessage: 'New version available!',
                whatsNew: '- Initial version',
                downloadUrl: 'https://play.google.com/store/apps/details?id=com.invtracker.inv_tracker',
                releaseDate: now,
                
                // Automation fields (used by workflows)
                pendingRelease: false,
                pendingVersion: null,
                pendingBuildNumber: null,
                uploadedAt: null,
                lastApprovedAt: now,
                
                // Metadata
                createdAt: now,
                updatedAt: now,
              };

              await db.collection('app_config').doc('version_info').set(initialData);

              console.log('✅ Firestore document initialized successfully!');
              console.log('');
              console.log('📋 Document structure:');
              console.log(JSON.stringify(initialData, null, 2));
              console.log('');
              console.log('🔗 View in Firebase Console:');
              console.log('https://console.firebase.google.com/project/invtracker-b19d1/firestore/data/app_config/version_info');

            } catch (error) {
              console.error('❌ Error:', error.message);
              if (error.stack) {
                console.error(error.stack);
              }
              process.exit(1);
            }
          }

          initializeFirestore();
          EOF

      - name: Verify Initialization
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: |
          node << 'EOF'
          const admin = require('firebase-admin');

          async function verify() {
            try {
              const serviceAccount = JSON.parse(process.env.FIREBASE_CREDENTIALS);
              const app = admin.initializeApp({
                credential: admin.credential.cert(serviceAccount)
              }, 'verify-app');

              const db = app.firestore();
              const doc = await db.collection('app_config').doc('version_info').get();

              if (!doc.exists) {
                console.error('❌ Document was not created!');
                process.exit(1);
              }

              // Validate schema
              const data = doc.data();
              const requiredFields = [
                'latestVersion', 'latestBuildNumber', 'minimumVersion', 'minimumBuildNumber',
                'forceUpdate', 'updateMessage', 'whatsNew', 'downloadUrl', 'releaseDate',
                'lastApprovedAt', 'createdAt', 'updatedAt'
              ];
              const missingFields = requiredFields.filter(field => !(field in data));

              if (missingFields.length > 0) {
                console.error('❌ Document is missing required fields!');
                console.error('   Missing:', missingFields.join(', '));
                console.error('');
                console.error('💡 The document may have been auto-created by cd-deploy-android.yml');
                console.error('   with incomplete schema. Re-run initialization with force_overwrite=true.');
                process.exit(1);
              }

              console.log('✅ Verification successful!');
              console.log('Document exists with complete schema.');

            } catch (error) {
              console.error('❌ Verification failed:', error.message);
              process.exit(1);
            }
          }

          verify();
          EOF