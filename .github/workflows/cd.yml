name: "CD: Release Automation"

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        default: 'bump-and-deploy'
        options:
          - 'bump-and-deploy'
          - 'deploy-tag'
          - 'promote-production'
      tag:
        description: 'Tag to deploy (required for deploy-tag)'
        required: false
        type: string
      rollout_percentage:
        description: 'Rollout percentage (for promote-production)'
        required: true
        type: choice
        default: '20'
        options:
          - '10'
          - '20'
          - '50'
          - '100'
      update_priority:
        description: 'In-app update priority (0-5, higher = more urgent, for promote-production)'
        required: true
        type: choice
        default: '2'
        options:
          - '0'
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'

env:
  MAX_APP_SIZE: 20971520
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: cd-release
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  bump-and-deploy:
    name: Bump Version & Deploy to Play Store (Alpha)
    runs-on: self-hosted
    if: |
      github.event_name == 'push' || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs && github.event.inputs.action == 'bump-and-deploy')
    
    steps:
      - name: Check Commit Message for Release Skip
        id: check_skip
        env:
          COMMIT_MSG: ${{ github.event.head_commit && github.event.head_commit.message || '' }}
        run: |
          if [[ "$COMMIT_MSG" == *"[skip-release]"* || "$COMMIT_MSG" == *"chore(release)"* || "$COMMIT_MSG" == "chore:"* ]]; then
            if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "Skipping automatic release bump for push commit"
              exit 0
            fi
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Checkout code
        if: steps.check_skip.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version from pubspec.yaml
        if: steps.check_skip.outputs.skip != 'true'
        id: current_version
        run: |
          FULL_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          VERSION_NAME=${FULL_VERSION%%+*}
          BUILD_NUM=${FULL_VERSION#*+}
          if [ "$BUILD_NUM" = "$VERSION_NAME" ]; then
            BUILD_NUM=0
          fi
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUM" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME, Build: $BUILD_NUM"

      - name: Bump Version
        if: steps.check_skip.outputs.skip != 'true'
        id: version_bump
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/common/version-bump@main
        with:
          bump-type: 'auto'
          tag-prefix: 'v'
          initial-version: ${{ steps.current_version.outputs.version_name }}
          push-tag: 'false'

      - name: Calculate build number
        if: steps.check_skip.outputs.skip != 'true'
        id: build_num
        run: |
          BUILD_NUM=$(($${{ steps.current_version.outputs.build_number }} + 1))
          echo "build_number=$BUILD_NUM" >> $GITHUB_OUTPUT
          echo "New build number: $BUILD_NUM"

      - name: Generate Changelog
        if: steps.check_skip.outputs.skip != 'true'
        id: changelog
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/common/changelog@main
        with:
          output-file: 'CHANGELOG.md'
          format: 'markdown'
          group-by: 'conventional-commits'

      - name: Update files with new version
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.version_bump.outputs.new-version }}"
          BUILD_NUM="${{ steps.build_num.outputs.build_number }}"
          NEW_VERSION_FULL="${NEW_VERSION}+${BUILD_NUM}"
          
          # Update pubspec.yaml
          sed -i '' "s/^version: .*/version: $NEW_VERSION_FULL/" pubspec.yaml
          
          # Update about_screen.dart
          sed -i '' "s/const String _appVersion = '.*'/const String _appVersion = '$NEW_VERSION'/" \
            lib/features/settings/presentation/screens/about_screen.dart
          sed -i '' "s/const String _buildNumber = '.*'/const String _buildNumber = '$BUILD_NUM'/" \
            lib/features/settings/presentation/screens/about_screen.dart

          # Update fastlane changelog
          mkdir -p fastlane/metadata/android/en-US/changelogs
          echo "${{ steps.changelog.outputs.latest-changes }}" > fastlane/metadata/android/en-US/changelogs/${BUILD_NUM}.txt

      - name: Flutter Setup
        if: steps.check_skip.outputs.skip != 'true'
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/flutter/setup@main
        with:
          flutter-channel: 'stable'
          cache-pub: 'true'

      - name: Generate Localizations
        if: steps.check_skip.outputs.skip != 'true'
        run: flutter gen-l10n

      - name: Build Android App Bundle
        if: steps.check_skip.outputs.skip != 'true'
        id: build
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/flutter/build-android@main
        with:
          build-type: 'appbundle'
          build-mode: 'release'
          obfuscate: 'true'
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Track App Size
        if: steps.check_skip.outputs.skip != 'true'
        id: app_size
        run: |
          AAB_PATH="${{ steps.build.outputs.artifact-path }}"
          AAB_SIZE=$(stat -f%z "$AAB_PATH")
          AAB_SIZE_MB=$(echo "scale=2; $AAB_SIZE / 1024 / 1024" | bc)

          echo "size_bytes=$AAB_SIZE" >> $GITHUB_OUTPUT
          echo "size_mb=$AAB_SIZE_MB" >> $GITHUB_OUTPUT

          echo "📦 App Bundle Size: ${AAB_SIZE_MB} MB"

          if [ $AAB_SIZE -gt $MAX_APP_SIZE ]; then
            echo "::warning::⚠️ App size (${AAB_SIZE_MB}MB) exceeds recommended maximum (20MB)"
          fi

      - name: Deploy to Google Play (Alpha)
        if: steps.check_skip.outputs.skip != 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_CREDENTIALS }}
          packageName: com.invtracker.inv_tracker
          releaseFiles: ${{ steps.build.outputs.artifact-path }}
          track: alpha
          status: completed
          inAppUpdatePriority: 2

      - name: Commit Version Bump
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          git add pubspec.yaml lib/features/settings/presentation/screens/about_screen.dart fastlane/
          git commit -m "chore(release): bump version to ${{ steps.version_bump.outputs.new-version }}+${{ steps.build_num.outputs.build_number }} [skip-release]"
          git push origin main

      - name: Create GitHub Release
        if: steps.check_skip.outputs.skip != 'true'
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/common/create-release@main
        with:
          tag: v${{ steps.version_bump.outputs.new-version }}
          release-name: 'Release v${{ steps.version_bump.outputs.new-version }}'
          body: |
            ## 📱 InvTrack v${{ steps.version_bump.outputs.new-version }}

            **Build Number:** ${{ steps.build_num.outputs.build_number }}
            **App Size:** ${{ steps.app_size.outputs.size_mb }} MB

            ${{ steps.changelog.outputs.latest-changes }}
          draft: false
          prerelease: false
          github-token: ${{ secrets.PAT_TOKEN }}

      - name: Slack Notification
        if: steps.check_skip.outputs.skip != 'true' && (success() || failure())
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} InvTrack v${{ steps.version_bump.outputs.new-version }} (Build ${{ steps.build_num.outputs.build_number }})",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ job.status == 'success' && '✅ *Release Deployed*' || '❌ *Release Failed*' }}\n*InvTrack* v${{ steps.version_bump.outputs.new-version }} (Build ${{ steps.build_num.outputs.build_number }})\n*Track:* Alpha\n*Size:* ${{ steps.app_size.outputs.size_mb }} MB"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-tag:
    name: Deploy Specific Tag to Play Store (Alpha)
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' && github.event.inputs && github.event.inputs.action == 'deploy-tag'

    steps:
      - name: Validate Tag Input
        run: |
          if [ -z "${{ github.event.inputs.tag }}" ]; then
            echo "::error::Tag is required for deploy-tag action"
            exit 1
          fi

      - name: Checkout specific tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Get version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Flutter Setup
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/flutter/setup@main
        with:
          flutter-channel: 'stable'
          cache-pub: 'true'

      - name: Generate Localizations
        run: flutter gen-l10n

      - name: Build Android App Bundle
        id: build
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/flutter/build-android@main
        with:
          build-type: 'appbundle'
          build-mode: 'release'
          obfuscate: 'true'
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Deploy to Google Play (Alpha)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_CREDENTIALS }}
          packageName: com.invtracker.inv_tracker
          releaseFiles: ${{ steps.build.outputs.artifact-path }}
          track: alpha
          status: completed
          inAppUpdatePriority: 2

      - name: Slack Notification
        if: success() || failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} InvTrack ${{ github.event.inputs.tag }} deployed to Alpha",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ job.status == 'success' && '✅ *Tag Deployed*' || '❌ *Deploy Failed*' }}\n*InvTrack* ${{ github.event.inputs.tag }}\n*Track:* Alpha"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  promote-production:
    name: Promote Alpha to Production
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' && github.event.inputs && github.event.inputs.action == 'promote-production'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Google Play API dependencies
        run: npm install googleapis@105 --save

      - name: Promote Release to Production
        id: promote
        run: |
          cat > promote.js << 'EOFJS'
          const {google} = require('googleapis');
          const androidpublisher = google.androidpublisher('v3');

          async function promoteToProduction() {
            const auth = new google.auth.GoogleAuth({
              credentials: JSON.parse(process.env.SERVICE_ACCOUNT_JSON),
              scopes: ['https://www.googleapis.com/auth/androidpublisher'],
            });

            const authClient = await auth.getClient();
            google.options({auth: authClient});

            const packageName = 'com.invtracker.inv_tracker';
            const rolloutPercentage = parseFloat(process.env.ROLLOUT_PERCENTAGE);
            const updatePriority = parseInt(process.env.UPDATE_PRIORITY);

            // Create new edit
            const editRes = await androidpublisher.edits.insert({
              packageName: packageName,
            });
            const editId = editRes.data.id;

            try {
              // Get latest version from alpha track
              const tracksRes = await androidpublisher.edits.tracks.get({
                packageName: packageName,
                editId: editId,
                track: 'alpha',
              });

              const alphaRelease = tracksRes.data.releases.find(r => r.status === 'completed');
              if (!alphaRelease) {
                throw new Error('No completed release found in alpha track');
              }

              console.log(`Promoting version codes: ${alphaRelease.versionCodes.join(', ')}`);

              // Promote to production with staged rollout
              await androidpublisher.edits.tracks.update({
                packageName: packageName,
                editId: editId,
                track: 'production',
                requestBody: {
                  releases: [{
                    versionCodes: alphaRelease.versionCodes,
                    userFraction: rolloutPercentage / 100,
                    status: 'inProgress',
                    inAppUpdatePriority: updatePriority,
                    releaseNotes: alphaRelease.releaseNotes,
                  }],
                },
              });

              // Commit the edit
              await androidpublisher.edits.commit({
                packageName: packageName,
                editId: editId,
              });

              console.log(`✅ Successfully promoted to production at ${rolloutPercentage}% rollout`);
              console.log(`Update priority: ${updatePriority}`);
            } catch (error) {
              // Delete failed edit
              await androidpublisher.edits.delete({
                packageName: packageName,
                editId: editId,
              });
              throw error;
            }
          }

          promoteToProduction().catch(error => {
            console.error('❌ Promotion failed:', error.message);
            process.exit(1);
          });
          EOFJS

          node promote.js
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_CREDENTIALS }}
          ROLLOUT_PERCENTAGE: ${{ github.event.inputs.rollout_percentage }}
          UPDATE_PRIORITY: ${{ github.event.inputs.update_priority }}

      - name: Slack Notification
        if: success() || failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} InvTrack promoted to Production",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ job.status == 'success' && '✅ *Promoted to Production*' || '❌ *Promotion Failed*' }}\n*InvTrack* Alpha → Production\n*Rollout:* ${{ github.event.inputs.rollout_percentage }}%\n*Priority:* ${{ github.event.inputs.update_priority }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
