name: "CD: Release Automation"

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        default: 'bump-and-deploy'
        options:
          - 'bump-and-deploy'
          - 'deploy-tag'
          - 'promote-production'
      tag:
        description: 'Tag to deploy (required for deploy-tag)'
        required: false
        type: string
      rollout_percentage:
        description: 'Rollout percentage (for promote-production)'
        required: true
        type: choice
        default: '20'
        options:
          - '10'
          - '20'
          - '50'
          - '100'
      update_priority:
        description: 'In-app update priority (0-5, higher = more urgent, for promote-production)'
        required: true
        type: choice
        default: '2'
        options:
          - '0'
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: cd-release
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  release:
    uses: ravitejakamalapuram/.github-workflows-shared/.github/workflows/flutter-cd.yml@main
    with:
      action: ${{ github.event.inputs.action || 'bump-and-deploy' }}
      tag: ${{ github.event.inputs.tag || '' }}
      rollout-percentage: ${{ github.event.inputs.rollout_percentage || '20' }}
      update-priority: ${{ github.event.inputs.update_priority || '2' }}
      package-name: 'com.invtracker.inv_tracker'
      update-dart-file: 'lib/features/settings/presentation/screens/about_screen.dart'
      runner-type: 'self-hosted'
      slack-app-name: 'InvTrack'
      slack-track: 'Alpha'
    secrets:
      pat-token: ${{ secrets.PAT_TOKEN }}
      android-keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      android-keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      android-key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
      android-key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}
      play-store-credentials: ${{ secrets.PLAY_STORE_CREDENTIALS }}
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
