name: "CD: Release Automation"

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        default: 'bump-and-deploy'
        options:
          - 'bump-and-deploy'
          - 'deploy-tag'
          - 'promote-production'
      tag:
        description: 'Tag to deploy (required for deploy-tag)'
        required: false
        type: string
      rollout_percentage:
        description: 'Rollout percentage (for promote-production)'
        required: true
        type: choice
        default: '20'
        options:
          - '10'
          - '20'
          - '50'
          - '100'
      update_priority:
        description: 'In-app update priority (0-5, higher = more urgent, for promote-production)'
        required: true
        type: choice
        default: '2'
        options:
          - '0'
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: cd-release
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  bump-and-deploy:
    name: Bump Version & Deploy to Play Store (Alpha)
    runs-on: self-hosted
    if: |
      github.event_name == 'push' || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs && github.event.inputs.action == 'bump-and-deploy')
    
    steps:
      - name: Check Commit Message for Release Skip
        id: check_skip
        env:
          COMMIT_MSG: ${{ github.event.head_commit && github.event.head_commit.message || '' }}
        run: |
          if [[ "$COMMIT_MSG" == *"[skip-release]"* || "$COMMIT_MSG" == *"chore(release)"* || "$COMMIT_MSG" == "chore:"* ]]; then
            if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "Skipping automatic release bump for push commit"
              exit 0
            fi
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Checkout code
        if: steps.check_skip.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate Changelog
        if: steps.check_skip.outputs.skip != 'true'
        id: changelog
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/common/changelog@main
        with:
          output-file: 'CHANGELOG.md'
          format: 'markdown'
          group-by: 'conventional-commits'

      - name: Bump Flutter Version & Update Files
        if: steps.check_skip.outputs.skip != 'true'
        id: version
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/flutter/version-bump@main
        with:
          bump-type: 'auto'
          update-dart-file: 'lib/features/settings/presentation/screens/about_screen.dart'
          fastlane-changelog: 'true'
          changelog-content: ${{ steps.changelog.outputs.latest-changes }}

      - name: Flutter Setup
        if: steps.check_skip.outputs.skip != 'true'
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/flutter/setup@main
        with:
          flutter-channel: 'stable'
          cache-pub: 'true'

      - name: Generate Localizations
        if: steps.check_skip.outputs.skip != 'true'
        run: flutter gen-l10n

      - name: Build Android App Bundle
        if: steps.check_skip.outputs.skip != 'true'
        id: build
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/flutter/build-android@main
        with:
          build-type: 'appbundle'
          build-mode: 'release'
          obfuscate: 'true'
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Track App Size
        if: steps.check_skip.outputs.skip != 'true'
        id: app_size
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/common/size-check@main
        with:
          file-path: ${{ steps.build.outputs.artifact-path }}
          max-size-mb: '20'

      - name: Deploy to Google Play (Alpha)
        if: steps.check_skip.outputs.skip != 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_CREDENTIALS }}
          packageName: com.invtracker.inv_tracker
          releaseFiles: ${{ steps.build.outputs.artifact-path }}
          track: alpha
          status: completed
          inAppUpdatePriority: 2

      - name: Commit Version Bump
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          git add pubspec.yaml lib/features/settings/presentation/screens/about_screen.dart fastlane/
          git commit -m "chore(release): bump version to ${{ steps.version.outputs.new-version }}+${{ steps.version.outputs.new-build-number }} [skip-release]"
          git push origin main

      - name: Create GitHub Release
        if: steps.check_skip.outputs.skip != 'true'
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/common/create-release@main
        with:
          tag-name: v${{ steps.version.outputs.new-version }}
          release-name: 'Release v${{ steps.version.outputs.new-version }}'
          body: |
            ## 📱 InvTrack v${{ steps.version.outputs.new-version }}

            **Build Number:** ${{ steps.version.outputs.new-build-number }}
            **App Size:** ${{ steps.app_size.outputs.size-mb }} MB

            ${{ steps.changelog.outputs.latest-changes }}
          draft: false
          prerelease: false

      - name: Slack Notification
        if: steps.check_skip.outputs.skip != 'true' && (success() || failure())
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/common/slack-notify@main
        with:
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: ${{ job.status }}
          app-name: 'InvTrack'
          version: ${{ steps.version.outputs.new-version }}
          build-number: ${{ steps.version.outputs.new-build-number }}
          track: 'Alpha'
          size-mb: ${{ steps.app_size.outputs.size-mb }}

  deploy-tag:
    name: Deploy Specific Tag to Play Store (Alpha)
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' && github.event.inputs && github.event.inputs.action == 'deploy-tag'

    steps:
      - name: Validate Tag Input
        run: |
          if [ -z "${{ github.event.inputs.tag }}" ]; then
            echo "::error::Tag is required for deploy-tag action"
            exit 1
          fi

      - name: Checkout specific tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Get version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Flutter Setup
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/flutter/setup@main
        with:
          flutter-channel: 'stable'
          cache-pub: 'true'

      - name: Generate Localizations
        run: flutter gen-l10n

      - name: Build Android App Bundle
        id: build
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/flutter/build-android@main
        with:
          build-type: 'appbundle'
          build-mode: 'release'
          obfuscate: 'true'
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Track App Size
        id: app_size
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/common/size-check@main
        with:
          file-path: ${{ steps.build.outputs.artifact-path }}
          max-size-mb: '20'

      - name: Deploy to Google Play (Alpha)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_CREDENTIALS }}
          packageName: com.invtracker.inv_tracker
          releaseFiles: ${{ steps.build.outputs.artifact-path }}
          track: alpha
          status: completed
          inAppUpdatePriority: 2

      - name: Slack Notification
        if: success() || failure()
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/common/slack-notify@main
        with:
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: ${{ job.status }}
          app-name: 'InvTrack'
          version: ${{ steps.version.outputs.version }}
          track: 'Alpha'
          size-mb: ${{ steps.app_size.outputs.size-mb }}

  promote-production:
    name: Promote Alpha to Production
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' && github.event.inputs && github.event.inputs.action == 'promote-production'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Promote Release to Production
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/android/promote-play@main
        with:
          service-account-json: ${{ secrets.PLAY_STORE_CREDENTIALS }}
          package-name: 'com.invtracker.inv_tracker'
          source-track: 'alpha'
          target-track: 'production'
          rollout-percentage: ${{ github.event.inputs.rollout_percentage }}
          update-priority: ${{ github.event.inputs.update_priority }}

      - name: Slack Notification
        if: success() || failure()
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/common/slack-notify@main
        with:
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: ${{ job.status }}
          app-name: 'InvTrack (Alpha -> Production)'
          track: 'Production'
