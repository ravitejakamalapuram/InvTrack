name: CI

on:
  push:
    branches: [main, develop]
  # PRs are covered by PR: Enterprise Review workflow

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Analyze
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff analysis

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'
          cache: false  # Self-hosted runners have Flutter installed locally

      - run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test --exclude-tags=golden

  code-quality:
    name: Code Quality Checks
    runs-on: self-hosted
    if: github.event_name == 'pull_request' || github.ref != 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for TODOs in new code
        run: |
          echo "🔍 Checking for TODOs in changed files..."
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.dart' | grep -v '_test.dart$' || true)
          if [ -n "$CHANGED_FILES" ]; then
            TODO_COUNT=$(echo "$CHANGED_FILES" | xargs grep -n "TODO\|FIXME\|HACK" 2>/dev/null | wc -l || echo "0")
            if [ "$TODO_COUNT" -gt 0 ]; then
              echo "⚠️ Found $TODO_COUNT TODO/FIXME/HACK comments in changed files:"
              echo "$CHANGED_FILES" | xargs grep -n "TODO\|FIXME\|HACK" 2>/dev/null || true
              echo ""
              echo "Please resolve or document these before merging."
            else
              echo "✅ No TODOs found in changed files"
            fi
          else
            echo "✅ No Dart files changed"
          fi

      - name: Check for print statements
        run: |
          echo "🔍 Checking for debug print statements..."
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'lib/*.dart' | grep -v '_test.dart$' || true)
          if [ -n "$CHANGED_FILES" ]; then
            # Look for print( but not debugPrint( and not in comments
            PRINT_COUNT=$(echo "$CHANGED_FILES" | xargs grep -n "^\s*print(" 2>/dev/null | wc -l || echo "0")
            if [ "$PRINT_COUNT" -gt 0 ]; then
              echo "❌ Found $PRINT_COUNT bare print() statements (use debugPrint instead):"
              echo "$CHANGED_FILES" | xargs grep -n "^\s*print(" 2>/dev/null || true
              exit 1
            else
              echo "✅ No bare print statements found"
            fi
          fi

      - name: Verify test coverage for new files
        run: |
          echo "🔍 Checking test coverage for new files..."
          NEW_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'lib/*.dart' | grep -v '_test.dart$' || true)
          MISSING_TESTS=""
          for file in $NEW_FILES; do
            # Skip generated files, models, entities (often tested indirectly)
            if [[ "$file" == *.g.dart ]] || [[ "$file" == *.freezed.dart ]]; then
              continue
            fi
            # Check if corresponding test exists
            TEST_FILE=$(echo "$file" | sed 's|lib/|test/|' | sed 's|\.dart$|_test.dart|')
            if [ ! -f "$TEST_FILE" ]; then
              # Check if it's a new file (not just modified)
              if ! git show origin/${{ github.base_ref }}:"$file" > /dev/null 2>&1; then
                MISSING_TESTS="$MISSING_TESTS\n  - $file (expected: $TEST_FILE)"
              fi
            fi
          done
          if [ -n "$MISSING_TESTS" ]; then
            echo "⚠️ New files without dedicated test files:"
            echo -e "$MISSING_TESTS"
            echo ""
            echo "Consider adding tests for these files."
          else
            echo "✅ All new files have corresponding test files or are exempt"
          fi

      - name: Check code complexity
        run: |
          echo "🔍 Analyzing code complexity..."

          # Check for overly complex functions (>15 decision points per 100 lines)
          echo "📊 Checking cyclomatic complexity..."
          COMPLEX_FILES=""
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'lib/**/*.dart' || true)

          for file in $CHANGED_FILES; do
            if [ -f "$file" ] && [[ "$file" != *"_test.dart" ]]; then
              # Check for excessive nesting (>4 levels)
              NESTING=$(grep -o "^\s*if\|^\s*for\|^\s*while\|^\s*switch" "$file" | wc -l | tr -d ' ')
              LINES=$(wc -l < "$file" | tr -d ' ')

              if [ "$LINES" -gt 0 ]; then
                # Calculate decision points per 100 lines
                COMPLEXITY=$(echo "scale=1; ($NESTING * 100) / $LINES" | bc)
                THRESHOLD=15

                # Use awk for floating point comparison
                if [ $(echo "$COMPLEXITY > $THRESHOLD" | bc) -eq 1 ]; then
                  COMPLEX_FILES="$COMPLEX_FILES\n  - $file: $COMPLEXITY decision points per 100 lines (threshold: $THRESHOLD)"
                fi
              fi
            fi
          done

          if [ -n "$COMPLEX_FILES" ]; then
            echo "⚠️ Files with high cyclomatic complexity:"
            echo -e "$COMPLEX_FILES"
            echo ""
            echo "💡 Consider refactoring complex logic into smaller functions."
            echo "   High complexity makes code harder to test and maintain."
          else
            echo "✅ All files have acceptable complexity"
          fi

      - name: Check code coverage
        run: |
          echo "📊 Checking test coverage..."

          # Run tests with coverage
          flutter test --coverage --reporter=compact || true

          # Check if coverage file exists
          if [ -f "coverage/lcov.info" ]; then
            # Install lcov if not available
            if ! command -v lcov &> /dev/null; then
              echo "Installing lcov..."
              sudo apt-get update -qq
              sudo apt-get install -y lcov
            fi

            # Generate coverage summary
            COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | grep -oP '\d+\.\d+(?=%)')

            echo "📈 Overall coverage: ${COVERAGE}%"

            # Check if coverage meets minimum threshold (60%)
            if [ $(echo "$COVERAGE < 60" | bc) -eq 1 ]; then
              echo "⚠️ Coverage is below 60% threshold"
              echo "💡 Add more tests to improve coverage"
            else
              echo "✅ Coverage meets minimum threshold"
            fi
          else
            echo "⚠️ No coverage data generated"
          fi

      - name: Check architectural patterns
        run: |
          echo "🏗️ Checking architectural patterns..."

          VIOLATIONS=""

          # Check for API calls in widgets (should be in repositories/services)
          if grep -rn "FirebaseFirestore\|http\.\|dio\." lib/features/*/presentation/widgets/ 2>/dev/null; then
            VIOLATIONS="$VIOLATIONS\n  ❌ API calls found in widgets (should be in repositories)"
          fi

          # Check for navigation in domain layer
          if grep -rn "Navigator\|GoRouter\|context\.go" lib/features/*/domain/ 2>/dev/null; then
            VIOLATIONS="$VIOLATIONS\n  ❌ Navigation found in domain layer (should be in presentation)"
          fi

          # Check for ref.read in build methods (should use ref.watch)
          if grep -rn "ref\.read" lib/ --include="*.dart" | grep "Widget build\|build(" 2>/dev/null; then
            VIOLATIONS="$VIOLATIONS\n  ❌ ref.read found in build methods (use ref.watch instead)"
          fi

          # Check for business logic in widgets (look for complex calculations)
          CHANGED_WIDGETS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'lib/**/widgets/*.dart' || true)
          for widget in $CHANGED_WIDGETS; do
            if [ -f "$widget" ]; then
              # Check for calculations in widgets (should be in domain/services)
              if grep -n "calculate\|compute\|process" "$widget" | grep -v "// " | grep -v "Calculator\|Computed" 2>/dev/null; then
                VIOLATIONS="$VIOLATIONS\n  ⚠️ Possible business logic in $widget (consider moving to domain layer)"
              fi
            fi
          done

          if [ -n "$VIOLATIONS" ]; then
            echo "⚠️ Architectural violations detected:"
            echo -e "$VIOLATIONS"
            echo ""
            echo "💡 Follow Clean Architecture principles:"
            echo "   - UI → State → Domain → Data"
            echo "   - Keep widgets simple and focused on presentation"
            echo "   - Move business logic to domain layer"
          else
            echo "✅ No architectural violations detected"
          fi
