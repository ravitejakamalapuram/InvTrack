name: CI

on:
  push:
    branches: [main, develop]
  # PRs are covered by PR: Enterprise Review workflow

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Analyze
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'
          cache: false  # Self-hosted runners have Flutter installed locally

      - run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test --exclude-tags=golden

