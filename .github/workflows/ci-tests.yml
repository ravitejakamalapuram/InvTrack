name: CI

on:
  push:
    branches: [main, develop]
  # PRs are covered by PR Review workflow

env:
  # Force GitHub Actions to use Node.js 24 (addresses deprecation warning)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      # Cache Flutter packages
      - name: Cache Flutter packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # Cache Gradle dependencies (for faster builds)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Flutter Setup
        id: flutter_setup
        run: |
          flutter --version
          flutter clean
          flutter pub get
          flutter gen-l10n

      # If flutter pub get fails, clear corrupted pub cache and retry
      - name: Clear corrupted pub cache and retry
        if: failure() && steps.flutter_setup.outcome == 'failure'
        run: |
          echo "⚠️ Detected pub cache corruption. Clearing and retrying..."
          rm -rf ~/.pub-cache/hosted/pub.dev/win32*
          rm -rf ~/.pub-cache/hosted/pub.dev/intl*
          rm -rf ~/.pub-cache/hosted/pub.dev/ffi_leak_tracker*
          flutter clean
          flutter pub get
          flutter gen-l10n

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test --exclude-tags=golden

      - name: Summary
        if: success()
        run: echo "✅ CI passed - ready for deployment"
