name: CI

on:
  push:
    branches: [main, develop]
  # PRs are covered by PR Review workflow

env:
  # Force GitHub Actions to use Node.js 24 (addresses deprecation warning)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Flutter Setup
        run: |
          flutter --version
          flutter clean
          flutter pub get
          flutter gen-l10n

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test --exclude-tags=golden

      - name: Summary
        if: success()
        run: echo "✅ CI passed - ready for deployment"
