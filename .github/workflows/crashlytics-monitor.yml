name: Crashlytics Monitor

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  monitor-crashes:
    name: Monitor Firebase Crashlytics
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          echo "Authenticating with Firebase..."
          firebase login:ci --token "$FIREBASE_TOKEN" || echo "Using existing credentials"

      - name: Make Script Executable
        run: chmod +x .github/scripts/check-crashlytics.sh

      - name: Check for Recent Crashes
        id: check_crashes
        env:
          FIREBASE_PROJECT: invtracker-b19d1
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: .github/scripts/check-crashlytics.sh

      - name: Create Crash Report Branch
        if: steps.check_crashes.outputs.has_crashes == 'true'
        run: |
          BRANCH_NAME="crashlytics/auto-report-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Generate Crash Report
        if: steps.check_crashes.outputs.has_crashes == 'true'
        run: |
          mkdir -p docs/crashlytics-reports
          
          cat > docs/crashlytics-reports/CRASH_REPORT_$(date +%Y%m%d).md << 'EOF'
          # Crashlytics Automated Report
          
          **Generated**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Period**: Last 6 hours
          **Project**: invtracker-b19d1
          
          ## Summary
          
          ${{ steps.check_crashes.outputs.crash_summary }}
          
          ## Action Required
          
          1. Review crash details in [Firebase Console](https://console.firebase.google.com/project/invtracker-b19d1/crashlytics)
          2. Prioritize critical crashes (high user impact)
          3. Create bug fix PRs for top issues
          4. Add investigation notes to Crashlytics issues
          
          ## Next Steps
          
          - [ ] Investigate root causes
          - [ ] Implement fixes
          - [ ] Add regression tests
          - [ ] Deploy fix to production
          
          ---
          
          **Auto-generated by Crashlytics Monitor workflow**
          EOF

      - name: Commit and Push
        if: steps.check_crashes.outputs.has_crashes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/crashlytics-reports/
          git commit -m "chore: add automated crashlytics report"
          git push origin "$BRANCH_NAME"

      - name: Create Pull Request
        if: steps.check_crashes.outputs.has_crashes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "🚨 Crashlytics: New Crashes Detected" \
            --body "## Automated Crash Report

          This PR was automatically created by the Crashlytics Monitor workflow.

          **Period**: Last 6 hours  
          **Status**: New crashes detected

          ### Summary
          
          ${{ steps.check_crashes.outputs.crash_summary }}

          ### Firebase Console
          
          View detailed crash reports: [Firebase Crashlytics Console](https://console.firebase.google.com/project/invtracker-b19d1/crashlytics)

          ### Action Items
          
          - [ ] Review crash stack traces
          - [ ] Identify root causes
          - [ ] Create bug fix PRs
          - [ ] Add regression tests
          - [ ] Update Crashlytics issue status

          ---
          
          **Auto-generated by GitHub Actions**" \
            --base main \
            --head "$BRANCH_NAME" \
            --label "crashlytics,automated"

      - name: Summary
        run: |
          if [ "${{ steps.check_crashes.outputs.has_crashes }}" == "true" ]; then
            echo "🚨 Crashes detected - PR created"
          else
            echo "✅ No new crashes in the last 6 hours"
          fi

