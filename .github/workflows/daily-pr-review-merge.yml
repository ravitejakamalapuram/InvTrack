name: "Daily: Auto Review & Merge PRs"

on:
  schedule:
    # Review PRs during business hours: 10:30am, 1:30pm, 4:30pm UTC
    # Adjust times based on your timezone and work schedule
    - cron: '30 10,13,16 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pull-requests: write
  checks: read

env:
  FLUTTER_VERSION: '3.38.4'

jobs:
  auto-review-merge:
    name: Review & Merge PRs
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Open PRs
        id: get_prs
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'created',
              direction: 'asc'
            });
            
            // Filter out draft PRs
            const readyPRs = prs.filter(pr => !pr.draft);
            
            console.log(`Found ${readyPRs.length} ready PRs to review`);
            core.setOutput('pr_numbers', JSON.stringify(readyPRs.map(pr => pr.number)));
            core.setOutput('pr_count', readyPRs.length);

      - name: Review and Merge Each PR
        if: steps.get_prs.outputs.pr_count > 0
        uses: actions/github-script@v7
        env:
          AUGMENT_SESSION_AUTH: ${{ secrets.AUGMENT_SESSION_AUTH }}
        with:
          script: |
            const prNumbers = JSON.parse('${{ steps.get_prs.outputs.pr_numbers }}');
            
            for (const prNumber of prNumbers) {
              console.log(`\n========================================`);
              console.log(`Processing PR #${prNumber}`);
              console.log(`========================================\n`);
              
              try {
                // Get PR details
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
                });
                
                console.log(`PR: ${pr.title}`);
                console.log(`Author: ${pr.user.login}`);
                console.log(`Mergeable: ${pr.mergeable}`);
                console.log(`Mergeable State: ${pr.mergeable_state}`);
                
                // Check if PR has conflicts
                if (pr.mergeable === false) {
                  console.log(`⚠️  PR #${prNumber} has merge conflicts - skipping`);
                  
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body: `## ⚠️ Auto-Merge Skipped: Merge Conflicts\n\n` +
                          `This PR has merge conflicts that need to be resolved.\n\n` +
                          `**Next Steps:**\n` +
                          `1. Rebase your branch on main: \`git rebase origin/main\`\n` +
                          `2. Resolve conflicts\n` +
                          `3. Force push: \`git push --force-with-lease\`\n\n` +
                          `*Auto-generated by Daily PR Review*`
                  });
                  continue;
                }

                // Get all status checks for the PR
                const { data: checks } = await github.rest.checks.listForRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: pr.head.sha
                });

                console.log(`\nStatus Checks:`);
                const checkRuns = checks.check_runs || [];
                let allChecksPassed = true;
                let criticalChecksFailed = false;

                const criticalChecks = ['Merge Gate', 'Code Health & Security', 'Tests', 'Architecture'];

                for (const check of checkRuns) {
                  console.log(`  - ${check.name}: ${check.conclusion || check.status}`);

                  if (check.conclusion !== 'success' && check.conclusion !== 'skipped') {
                    allChecksPassed = false;

                    if (criticalChecks.some(c => check.name.includes(c))) {
                      criticalChecksFailed = true;
                    }
                  }
                }

                // Check if PR is approved
                const { data: reviews } = await github.rest.pulls.listReviews({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
                });

                const latestReviews = {};
                for (const review of reviews) {
                  latestReviews[review.user.login] = review.state;
                }

                const hasApproval = Object.values(latestReviews).includes('APPROVED');
                const hasChangesRequested = Object.values(latestReviews).includes('CHANGES_REQUESTED');

                console.log(`\nReview Status:`);
                console.log(`  Approvals: ${hasApproval ? '✅' : '❌'}`);
                console.log(`  Changes Requested: ${hasChangesRequested ? '⚠️' : '✅'}`);

                // Decision logic
                const canAutoMerge = allChecksPassed && !criticalChecksFailed && !hasChangesRequested;
                const isConfident = allChecksPassed && hasApproval;

                console.log(`\nDecision:`);
                console.log(`  All Checks Passed: ${allChecksPassed}`);
                console.log(`  Critical Checks Failed: ${criticalChecksFailed}`);
                console.log(`  Can Auto-Merge: ${canAutoMerge}`);
                console.log(`  AI Confident: ${isConfident}`);

                if (canAutoMerge && isConfident) {
                  // AUTO-MERGE: All checks passed and has approval
                  console.log(`\n✅ AUTO-MERGING PR #${prNumber}`);

                  try {
                    await github.rest.pulls.merge({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: prNumber,
                      merge_method: 'squash',
                      commit_title: pr.title,
                      commit_message: `${pr.body || ''}\n\nAuto-merged by Daily PR Review`
                    });

                    // Delete branch after merge
                    try {
                      await github.rest.git.deleteRef({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        ref: `heads/${pr.head.ref}`
                      });
                      console.log(`✅ Deleted branch: ${pr.head.ref}`);
                    } catch (e) {
                      console.log(`⚠️  Could not delete branch: ${e.message}`);
                    }

                    console.log(`✅ Successfully merged PR #${prNumber}`);
                  } catch (error) {
                    console.error(`❌ Failed to merge PR #${prNumber}: ${error.message}`);
                  }
                } else {
                  // POST REVIEW COMMENT: Issues found
                  console.log(`\n⚠️  Cannot auto-merge PR #${prNumber} - posting review comment`);

                  let commentBody = `## 🤖 Daily Auto-Review Report\n\n`;
                  commentBody += `**Status:** ⚠️ Not ready for auto-merge\n\n`;

                  // Add issues section
                  commentBody += `### Issues Found:\n\n`;

                  if (criticalChecksFailed) {
                    commentBody += `❌ **Critical checks failed** - The following checks must pass:\n`;
                    for (const check of checkRuns) {
                      if (criticalChecks.some(c => check.name.includes(c)) &&
                          check.conclusion !== 'success' &&
                          check.conclusion !== 'skipped') {
                        commentBody += `  - ${check.name}: ${check.conclusion}\n`;
                      }
                    }
                    commentBody += `\n`;
                  }

                  if (!allChecksPassed && !criticalChecksFailed) {
                    commentBody += `⚠️  **Some checks failed** - Review the following:\n`;
                    for (const check of checkRuns) {
                      if (check.conclusion !== 'success' && check.conclusion !== 'skipped') {
                        commentBody += `  - ${check.name}: ${check.conclusion}\n`;
                      }
                    }
                    commentBody += `\n`;
                  }

                  if (hasChangesRequested) {
                    commentBody += `⚠️  **Changes requested** - Address reviewer feedback\n\n`;
                  }

                  if (!hasApproval) {
                    commentBody += `⚠️  **No approvals** - Needs at least one approval\n\n`;
                  }

                  // Add next steps
                  commentBody += `### Next Steps:\n\n`;
                  if (criticalChecksFailed) {
                    commentBody += `1. Fix critical check failures (see Enterprise Review workflow)\n`;
                    commentBody += `2. Push your changes to trigger re-check\n`;
                  }
                  if (hasChangesRequested) {
                    commentBody += `1. Address reviewer feedback\n`;
                    commentBody += `2. Request re-review after changes\n`;
                  }
                  if (!hasApproval && !hasChangesRequested) {
                    commentBody += `1. Wait for reviewer approval\n`;
                  }

                  commentBody += `\n---\n`;
                  commentBody += `*Auto-generated by Daily PR Review • Next review: Tomorrow at 1pm*`;

                  // Find and update existing comment or create new one
                  const { data: comments } = await github.rest.issues.listComments({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber
                  });

                  const existingComment = comments.find(c =>
                    c.user.login === 'github-actions[bot]' &&
                    c.body.includes('Daily Auto-Review Report')
                  );

                  if (existingComment) {
                    await github.rest.issues.updateComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      comment_id: existingComment.id,
                      body: commentBody
                    });
                  } else {
                    await github.rest.issues.createComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: prNumber,
                      body: commentBody
                    });
                  }
                }
              } catch (error) {
                console.error(`❌ Error processing PR #${prNumber}: ${error.message}`);
              }
            }

            console.log(`\n========================================`);
            console.log(`Daily PR Review Complete`);
            console.log(`========================================`);

