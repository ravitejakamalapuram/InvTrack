name: Deploy Android App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g., v3.3.1)'
        required: true
        type: string

permissions:
  contents: write

env:
  # App size threshold in bytes (20 MB)
  MAX_APP_SIZE: 20971520

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
            VERSION=${VERSION#v}
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks

      - name: Create key.properties
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "storePassword=$STORE_PASSWORD" > android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties
          echo "key.properties created:"
          cat android/key.properties | sed 's/Password=.*/Password=***/'

      - name: Verify keystore
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -z "$STORE_PASSWORD" ]; then
            echo "ERROR: STORE_PASSWORD secret is not set!"
            exit 1
          fi
          keytool -list -keystore android/app/keystore.jks -storepass "$STORE_PASSWORD"

      # Security Scanning
      - name: Security scan - Check for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        id: gitleaks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Security scan - Dependency vulnerabilities
        id: security
        continue-on-error: true
        run: |
          # Check for outdated packages with known issues
          flutter pub outdated --json > outdated.json || true

          # Count outdated packages
          OUTDATED_COUNT=$(cat outdated.json | jq '.packages | length' 2>/dev/null || echo "0")
          echo "outdated_count=$OUTDATED_COUNT" >> $GITHUB_OUTPUT

          if [ "$OUTDATED_COUNT" -gt "0" ]; then
            echo "⚠️ Found $OUTDATED_COUNT outdated packages"
            flutter pub outdated
          else
            echo "✅ All packages are up to date"
          fi

      - name: Build Release Bundle
        run: flutter build appbundle --release

      # Track App Size
      - name: Track app size
        id: app_size
        run: |
          AAB_PATH="build/app/outputs/bundle/release/app-release.aab"
          SIZE_BYTES=$(stat -c%s "$AAB_PATH")
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)

          echo "size_bytes=$SIZE_BYTES" >> $GITHUB_OUTPUT
          echo "size_mb=$SIZE_MB" >> $GITHUB_OUTPUT

          echo "📦 App Bundle Size: ${SIZE_MB} MB ($SIZE_BYTES bytes)"

          # Check if exceeds threshold
          if [ "$SIZE_BYTES" -gt "$MAX_APP_SIZE" ]; then
            echo "⚠️ WARNING: App size exceeds ${MAX_APP_SIZE} bytes threshold!"
            echo "size_warning=true" >> $GITHUB_OUTPUT
          else
            echo "✅ App size is within acceptable limits"
            echo "size_warning=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Google Play (Closed Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_CREDENTIALS }}
          packageName: com.invtracker.inv_tracker
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: alpha
          status: completed
          releaseName: v${{ steps.version.outputs.version }}
          whatsNewDirectory: distribution/whatsnew

      - name: Get changelog for notifications
        id: changelog
        run: |
          if [ -f "distribution/whatsnew/whatsnew-en-US" ]; then
            CHANGELOG=$(cat distribution/whatsnew/whatsnew-en-US | head -20)
          else
            CHANGELOG="No changelog available"
          fi
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Release v${{ steps.version.outputs.version }}

            App has been deployed to Google Play closed testing (alpha track).

            ### 📦 App Size
            ${{ steps.app_size.outputs.size_mb }} MB

            ### 📝 Changes
            ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Slack Notification - Success
      - name: Notify Slack - Success
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 InvTrack v${{ steps.version.outputs.version }} Deployed!",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Track:*\nAlpha (Closed Testing)"},
                    {"type": "mrkdwn", "text": "*App Size:*\n${{ steps.app_size.outputs.size_mb }} MB"}
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Security:* ${{ steps.gitleaks.outcome == 'success' && '✅ No secrets leaked' || '⚠️ Check gitleaks results' }}\n*Dependencies:* ${{ steps.security.outputs.outdated_count }} outdated packages"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Changes:*\n${{ steps.changelog.outputs.content }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Release"},
                      "url": "https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"
                    },
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "Play Console"},
                      "url": "https://play.google.com/console"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # Slack Notification - Failure
      - name: Notify Slack - Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ InvTrack v${{ steps.version.outputs.version }} Deploy Failed!",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Deployment to Google Play failed. Check the workflow logs for details."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Logs"},
                      "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | v${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Track | Alpha (Closed Testing) |" >> $GITHUB_STEP_SUMMARY
          echo "| App Size | ${{ steps.app_size.outputs.size_mb }} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ steps.gitleaks.outcome == 'success' && '✅ Pass' || '⚠️ Check' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Outdated Deps | ${{ steps.security.outputs.outdated_count }} |" >> $GITHUB_STEP_SUMMARY
