name: "Fix Stuck Release State"

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  fix-stuck-release:
    name: Fix Stuck Release
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup dependencies
        run: |
          SYSTEM_NODE_MODULES="/opt/homebrew/lib/node_modules"
          
          if [ -d "$SYSTEM_NODE_MODULES/googleapis" ] && [ -d "$SYSTEM_NODE_MODULES/firebase-admin" ]; then
            echo "✅ Using system globally installed packages"
            echo "NODE_PATH=$SYSTEM_NODE_MODULES" >> $GITHUB_ENV
            exit 0
          fi
          
          echo "❌ Required packages not found"
          exit 1

      - name: Fix Stuck Release State
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: |
          node << 'EOF'
          const admin = require('firebase-admin');
          
          const serviceAccount = JSON.parse(process.env.FIREBASE_CREDENTIALS);
          
          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount)
          });
          
          const db = admin.firestore();
          
          async function fixStuckRelease() {
            try {
              console.log('🔧 Fixing stuck release state...\n');
          
              const versionDoc = await db.collection('app_config').doc('version_info').get();
              const data = versionDoc.data();
          
              console.log('📋 Current Firestore state:');
              console.log('  latestVersion:', data.latestVersion);
              console.log('  latestBuildNumber:', data.latestBuildNumber);
              console.log('  pendingRelease:', data.pendingRelease);
              console.log('  pendingVersion:', data.pendingVersion);
              console.log('  pendingBuildNumber:', data.pendingBuildNumber);
              console.log('');
          
              await db.collection('app_config').doc('version_info').update({
                pendingRelease: true,
              });
          
              console.log('✅ Updated pendingRelease to true');
              console.log('');
              console.log('🚀 Workflow will run on next schedule and update Firestore');
          
              process.exit(0);
            } catch (error) {
              console.error('❌ Error:', error.message);
              process.exit(1);
            }
          }
          
          fixStuckRelease();
          EOF

