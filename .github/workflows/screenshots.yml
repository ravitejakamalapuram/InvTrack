name: Generate Screenshots

on:
  # Run weekly on Sunday at midnight
  schedule:
    - cron: '0 0 * * 0'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      upload_to_store:
        description: 'Commit screenshots to repository'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  generate-screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            echo "Emulator started, running screenshot tests..."
            flutter test integration_test/screenshots_test.dart --dart-define=SCREENSHOT_MODE=true || true

      - name: Collect screenshots
        run: |
          mkdir -p screenshot_output
          
          # Find and copy screenshots
          find . -name "*.png" -path "*/screenshots/*" -exec cp {} screenshot_output/ \; 2>/dev/null || true
          find /tmp -name "screenshot_*.png" -exec cp {} screenshot_output/ \; 2>/dev/null || true
          
          echo "Screenshots collected:"
          ls -la screenshot_output/ || echo "No screenshots found"

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots-${{ github.run_number }}
          path: screenshot_output/
          if-no-files-found: warn
          retention-days: 30

      - name: Update store assets
        if: inputs.upload_to_store == true
        run: |
          # Copy screenshots to store_assets
          if [ -d "screenshot_output" ] && [ "$(ls -A screenshot_output)" ]; then
            cp screenshot_output/*.png store_assets/screenshots/phone/ 2>/dev/null || true
            
            # Rename with proper naming convention
            cd store_assets/screenshots/phone/
            for f in screenshot_*.png; do
              # Rename based on screen name in filename
              case "$f" in
                *dashboard*) mv "$f" "01_dashboard.png" 2>/dev/null || true ;;
                *investment_list*) mv "$f" "02_investment_list.png" 2>/dev/null || true ;;
                *investment_detail*) mv "$f" "03_investment_detail.png" 2>/dev/null || true ;;
                *add_investment*) mv "$f" "04_add_investment.png" 2>/dev/null || true ;;
                *goals*) mv "$f" "05_goals.png" 2>/dev/null || true ;;
                *settings*) mv "$f" "06_settings.png" 2>/dev/null || true ;;
              esac
            done
            
            echo "Store assets updated:"
            ls -la
          fi

      - name: Commit updated screenshots
        if: inputs.upload_to_store == true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add store_assets/screenshots/
          
          if git diff --staged --quiet; then
            echo "No screenshot changes to commit"
          else
            git commit -m "chore: Update Play Store screenshots [skip-release]"
            git push
            echo "Screenshots committed and pushed"
          fi

      - name: Notify completion
        run: |
          echo "## 📸 Screenshot Generation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Screenshots have been generated and saved as artifacts." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To use these screenshots:" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the artifact from this workflow run" >> $GITHUB_STEP_SUMMARY
          echo "2. Review and edit as needed" >> $GITHUB_STEP_SUMMARY
          echo "3. Upload to Play Console" >> $GITHUB_STEP_SUMMARY

