name: "CD: Deploy to Play Store"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g., v3.3.1)'
        required: true
        type: string

permissions:
  contents: write

env:
  # App size threshold in bytes (20 MB)
  MAX_APP_SIZE: 20971520
  # Force GitHub Actions to use Node.js 24 (addresses deprecation warning)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Prevent concurrent deployments to avoid conflicts
concurrency:
  group: android-deploy-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: self-hosted
    timeout-minutes: 60  # Prevent hanging deployments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
            VERSION=${VERSION#v}
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"

      - name: Verify local environment
        run: |
          echo "🔍 Checking local environment..."
          echo "Flutter: $(flutter --version | head -1)"
          echo "Java: $(java -version 2>&1 | head -1)"
          echo "Dart: $(dart --version)"

      - name: Get dependencies
        run: flutter pub get

      - name: Copy signing files from persistent location
        run: |
          # For self-hosted runner: signing files stored at ~/invtrack-keys/
          KEYS_DIR="$HOME/invtrack-keys"

          # Copy keystore
          if [ -f "$KEYS_DIR/upload-keystore.jks" ]; then
            cp "$KEYS_DIR/upload-keystore.jks" android/upload-keystore.jks
            echo "✅ Keystore copied"
          else
            echo "⚠️ No keystore found at $KEYS_DIR/upload-keystore.jks"
          fi

          # Copy key.properties
          if [ -f "$KEYS_DIR/key.properties" ]; then
            cp "$KEYS_DIR/key.properties" android/key.properties
            echo "✅ key.properties copied"
          else
            echo "⚠️ No key.properties found at $KEYS_DIR/key.properties"
          fi

      - name: Verify keystore
        run: |
          if [ ! -f "android/upload-keystore.jks" ]; then
            echo "ERROR: Keystore not found at android/upload-keystore.jks"
            exit 1
          fi
          echo "✅ Keystore found"
          keytool -list -keystore android/upload-keystore.jks -storepass invtracker123 2>/dev/null | head -5

      # Security Scanning
      - name: Security scan - Check for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        id: gitleaks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Security scan - Dependency vulnerabilities
        id: security
        continue-on-error: true
        run: |
          # Check for outdated packages with known issues
          flutter pub outdated --json > outdated.json || true

          # Count outdated packages
          OUTDATED_COUNT=$(cat outdated.json | jq '.packages | length' 2>/dev/null || echo "0")
          echo "outdated_count=$OUTDATED_COUNT" >> $GITHUB_OUTPUT

          if [ "$OUTDATED_COUNT" -gt "0" ]; then
            echo "⚠️ Found $OUTDATED_COUNT outdated packages"
            flutter pub outdated
          else
            echo "✅ All packages are up to date"
          fi

      - name: Build Release Bundle
        run: flutter build appbundle --release

      # Track App Size
      - name: Track app size
        id: app_size
        run: |
          AAB_PATH="build/app/outputs/bundle/release/app-release.aab"
          # macOS compatible stat command
          SIZE_BYTES=$(stat -f%z "$AAB_PATH" 2>/dev/null || stat -c%s "$AAB_PATH" 2>/dev/null)
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)

          echo "size_bytes=$SIZE_BYTES" >> $GITHUB_OUTPUT
          echo "size_mb=$SIZE_MB" >> $GITHUB_OUTPUT

          echo "📦 App Bundle Size: ${SIZE_MB} MB ($SIZE_BYTES bytes)"

          # Check if exceeds threshold
          if [ "$SIZE_BYTES" -gt "$MAX_APP_SIZE" ]; then
            echo "⚠️ WARNING: App size exceeds ${MAX_APP_SIZE} bytes threshold!"
            echo "size_warning=true" >> $GITHUB_OUTPUT
          else
            echo "✅ App size is within acceptable limits"
            echo "size_warning=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare What's New for Play Store
        id: whatsnew
        run: |
          # Get version code from pubspec.yaml (build number after +)
          VERSION_CODE=$(grep 'version:' pubspec.yaml | sed 's/.*+//')
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

          # Create the whatsnew directory structure expected by upload-google-play
          mkdir -p whatsnew

          # Look for changelog with this version code, or fall back to latest
          CHANGELOG_FILE="android/fastlane/metadata/android/en-US/changelogs/${VERSION_CODE}.txt"

          if [ -f "$CHANGELOG_FILE" ]; then
            cp "$CHANGELOG_FILE" whatsnew/whatsnew-en-US
            echo "✅ Using changelog for version code $VERSION_CODE"
          else
            # Find the latest changelog file
            LATEST=$(ls -1 android/fastlane/metadata/android/en-US/changelogs/*.txt 2>/dev/null | sort -t/ -k7 -n | tail -1)
            if [ -n "$LATEST" ]; then
              cp "$LATEST" whatsnew/whatsnew-en-US
              echo "⚠️ Using latest changelog: $LATEST"
            else
              echo "No changelog available for v${{ steps.version.outputs.version }}" > whatsnew/whatsnew-en-US
              echo "⚠️ No changelog found, using placeholder"
            fi
          fi

          echo "What's New content:"
          cat whatsnew/whatsnew-en-US

      - name: Deploy to Google Play (Closed Testing)
        id: deploy
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_CREDENTIALS }}
          packageName: com.invtracker.inv_tracker
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: alpha
          status: completed
          releaseName: v${{ steps.version.outputs.version }}
          whatsNewDirectory: whatsnew

      - name: Setup Node.js for Firestore update
        if: success()
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Firebase Admin SDK
        if: success()
        run: |
          echo "📦 Setting up Firebase Admin SDK..."

          # Check system's global npm packages (Homebrew installation)
          SYSTEM_NODE_MODULES="/opt/homebrew/lib/node_modules"

          if [ -d "$SYSTEM_NODE_MODULES/firebase-admin" ]; then
            echo "✅ Using system globally installed firebase-admin"
            echo "NODE_PATH=$SYSTEM_NODE_MODULES" >> $GITHUB_ENV
            exit 0
          fi

          # If not found, provide instructions
          echo "❌ firebase-admin not found in $SYSTEM_NODE_MODULES"
          echo ""
          echo "📋 One-time setup required:"
          echo "   Run this command on your Mac (not in the runner):"
          echo "   npm install -g firebase-admin"
          echo ""
          echo "💡 This is a one-time setup. The package will be reused for all future runs."
          exit 1

      - name: Set pending release flag in Firestore
        if: success()
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.whatsnew.outputs.version_code }}
        run: |
          node << 'EOF'
          const admin = require('firebase-admin');

          async function setPendingFlag() {
            try {
              // Initialize Firebase Admin
              const serviceAccount = JSON.parse(process.env.FIREBASE_CREDENTIALS);
              admin.initializeApp({
                credential: admin.credential.cert(serviceAccount)
              });

              const db = admin.firestore();
              const version = process.env.VERSION;
              const buildNumber = parseInt(process.env.BUILD_NUMBER);
              const uploadedAt = new Date().toISOString();

              console.log('📝 Setting pending release flag in Firestore...');
              console.log('   Version:', version);
              console.log('   Build Number:', buildNumber);
              console.log('   Uploaded At:', uploadedAt);

              // First, verify document exists
              const versionDoc = await db.collection('app_config').doc('version_info').get();

              if (!versionDoc.exists) {
                console.warn('⚠️  WARNING: Firestore document app_config/version_info does not exist!');
                console.log('📝 Creating document with pending release info...');
                console.log('');
                console.log('ℹ️  Note: After manual promotion, you should run the init workflow to set proper defaults.');

                // Create minimal document with pending info
                await db.collection('app_config').doc('version_info').set({
                  pendingRelease: true,
                  pendingVersion: version,
                  pendingBuildNumber: buildNumber,
                  uploadedAt: uploadedAt,
                  // Temporary defaults - should be updated by init workflow
                  latestVersion: '1.0.0',
                  latestBuildNumber: 1,
                  minimumVersion: '1.0.0',
                  minimumBuildNumber: 1,
                  forceUpdate: false,
                });

                console.log('✅ Temporary document created');
                console.log('🔧 Recommended: Run "Init: Firestore Version Info" workflow to set proper defaults');
                return;
              }

              // Set pending release flag (use merge to avoid overwriting other fields)
              await db.collection('app_config').doc('version_info').set({
                pendingRelease: true,
                pendingVersion: version,
                pendingBuildNumber: buildNumber,
                uploadedAt: uploadedAt,
              }, { merge: true });

              console.log('✅ Pending release flag set successfully!');
              console.log('');
              console.log('📋 Next steps:');
              console.log('   1. Manually promote from alpha → production in Play Console');
              console.log('   2. Automated checker will detect promotion (runs hourly)');
              console.log('   3. Firestore will be updated automatically');
              console.log('   4. Users will see update notification');
              console.log('');
              console.log('🔗 Play Console: https://play.google.com/console/u/0/developers/7885006060068362419/app/4975815827002913060/tracks/alpha');

            } catch (error) {
              console.error('❌ Error setting pending flag:', error.message);
              if (error.stack) {
                console.error(error.stack);
              }
              // Fail the workflow if document doesn't exist
              if (error.message.includes('not initialized')) {
                process.exit(1);
              }
              // Don't fail for other errors
              console.log('⚠️ Continuing anyway - you can manually trigger version update later.');
            }
          }

          setPendingFlag();
          EOF

      - name: Get changelog for notifications
        id: changelog
        run: |
          if [ -f "whatsnew/whatsnew-en-US" ]; then
            CHANGELOG=$(cat whatsnew/whatsnew-en-US | head -10)
          else
            CHANGELOG="No changelog available"
          fi
          # Store raw content for GitHub Release
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Create JSON-escaped version for Slack (replace newlines with \n, escape quotes)
          SLACK_CHANGELOG=$(echo "$CHANGELOG" | sed 's/"/\\"/g' | tr '\n' '␤' | sed 's/␤/\\n/g')
          echo "slack_content=$SLACK_CHANGELOG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Release v${{ steps.version.outputs.version }}

            App has been deployed to Google Play Closed Testing (alpha) track.

            ### 📦 App Size
            ${{ steps.app_size.outputs.size_mb }} MB

            ### 📝 Changes
            ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Slack Notification - Success
      - name: Notify Slack - Success
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 InvTrack v${{ steps.version.outputs.version }} Deployed!",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Track:*\nAlpha (Closed Testing)"},
                    {"type": "mrkdwn", "text": "*App Size:*\n${{ steps.app_size.outputs.size_mb }} MB"}
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Security:* ${{ steps.gitleaks.outcome == 'success' && '✅ No secrets leaked' || '⚠️ Check gitleaks results' }}\n*Dependencies:* ${{ steps.security.outputs.outdated_count }} outdated packages"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Changes:*\n${{ steps.changelog.outputs.slack_content }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Release"},
                      "url": "https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"
                    },
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "Play Console"},
                      "url": "https://play.google.com/console"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # Slack Notification - Failure
      - name: Notify Slack - Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ InvTrack v${{ steps.version.outputs.version }} Deploy Failed!",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Deployment to Google Play failed. Check the workflow logs for details."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Logs"},
                      "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | v${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Track | Alpha (Closed Testing) |" >> $GITHUB_STEP_SUMMARY
          echo "| App Size | ${{ steps.app_size.outputs.size_mb }} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ steps.gitleaks.outcome == 'success' && '✅ Pass' || '⚠️ Check' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Outdated Deps | ${{ steps.security.outputs.outdated_count }} |" >> $GITHUB_STEP_SUMMARY
