name: "Debug Firestore State"

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  debug-firestore:
    name: Debug Firestore State
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup dependencies
        run: |
          SYSTEM_NODE_MODULES="/opt/homebrew/lib/node_modules"
          
          if [ -d "$SYSTEM_NODE_MODULES/googleapis" ] && [ -d "$SYSTEM_NODE_MODULES/firebase-admin" ]; then
            echo "✅ Using system globally installed packages"
            echo "NODE_PATH=$SYSTEM_NODE_MODULES" >> $GITHUB_ENV
            exit 0
          fi
          
          echo "❌ Required packages not found"
          exit 1

      - name: Check Firestore State
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: |
          node << 'EOF'
          const admin = require('firebase-admin');
          
          const serviceAccount = JSON.parse(process.env.FIREBASE_CREDENTIALS);
          
          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount)
          });
          
          const db = admin.firestore();
          
          async function debugFirestore() {
            try {
              console.log('🔍 Checking Firestore state...\n');
          
              const versionDoc = await db.collection('app_config').doc('version_info').get();
              const data = versionDoc.data();
          
              console.log('📋 FULL Firestore Document:');
              console.log(JSON.stringify(data, null, 2));
              console.log('');
              
              console.log('📊 Key Fields:');
              console.log('  latestVersion:', data.latestVersion);
              console.log('  latestBuildNumber:', data.latestBuildNumber);
              console.log('  releaseDate:', data.releaseDate);
              console.log('  lastApprovedAt:', data.lastApprovedAt);
              console.log('  pendingRelease:', data.pendingRelease);
              console.log('  pendingVersion:', data.pendingVersion);
              console.log('  pendingBuildNumber:', data.pendingBuildNumber);
              console.log('  updateMessage:', data.updateMessage);
              console.log('  whatsNew:', data.whatsNew);
              console.log('');
              
              // Check if releaseDate is in the past
              if (data.releaseDate) {
                const releaseDate = new Date(data.releaseDate);
                const now = new Date();
                const isPast = now > releaseDate;
                const minutesUntilRelease = (releaseDate - now) / (1000 * 60);
                
                console.log('⏰ Release Date Analysis:');
                console.log('  Release Date:', releaseDate.toISOString());
                console.log('  Current Time:', now.toISOString());
                console.log('  Is Released:', isPast ? '✅ YES' : '❌ NO');
                if (!isPast) {
                  console.log('  Minutes Until Release:', Math.ceil(minutesUntilRelease));
                } else {
                  console.log('  Released:', Math.floor(-minutesUntilRelease), 'minutes ago');
                }
              } else {
                console.log('⚠️  No releaseDate field found!');
              }
          
              process.exit(0);
            } catch (error) {
              console.error('❌ Error:', error.message);
              process.exit(1);
            }
          }
          
          debugFirestore();
          EOF

