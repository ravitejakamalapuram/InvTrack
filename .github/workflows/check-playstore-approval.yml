name: "Auto-Check Play Store Approval"

on:
  # Check Play Store approval status during business hours (9am-6pm UTC)
  # Runs at: 9:30, 10:30, 11:30, 12:30, 1:30, 2:30, 3:30, 4:30, 5:30
  schedule:
    - cron: '30 9-17 * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  check-approval:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup dependencies
        run: |
          echo "📦 Setting up Node.js dependencies..."

          # Check system's global npm packages (Homebrew installation)
          SYSTEM_NODE_MODULES="/opt/homebrew/lib/node_modules"

          if [ -d "$SYSTEM_NODE_MODULES/googleapis" ] && [ -d "$SYSTEM_NODE_MODULES/firebase-admin" ]; then
            echo "✅ Using system globally installed packages"
            echo "NODE_PATH=$SYSTEM_NODE_MODULES" >> $GITHUB_ENV
            exit 0
          fi

          # If not found, provide instructions
          echo "❌ Required packages not found in $SYSTEM_NODE_MODULES"
          echo ""
          echo "📋 One-time setup required:"
          echo "   Run this command on your Mac (not in the runner):"
          echo "   npm install -g googleapis firebase-admin"
          echo ""
          echo "💡 This is a one-time setup. The packages will be reused for all future runs."
          exit 1

      - name: Check Play Store Release Status
        id: check_status
        env:
          PLAY_STORE_CREDENTIALS: ${{ secrets.PLAY_STORE_CREDENTIALS }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: |
          node << 'EOF'
          const { google } = require('googleapis');
          const admin = require('firebase-admin');
          const fs = require('fs');

          async function checkPlayStoreStatus() {
            try {
              // Initialize Firebase Admin
              const firebaseAuth = JSON.parse(process.env.FIREBASE_CREDENTIALS);
              admin.initializeApp({
                credential: admin.credential.cert(firebaseAuth)
              });

              const db = admin.firestore();

              // STEP 1: Check if there's a pending release
              console.log('🔍 Checking for pending release...');
              const versionDoc = await db.collection('app_config').doc('version_info').get();
              const versionData = versionDoc.data();

              if (!versionData.pendingRelease) {
                console.log('✅ No pending release. Exiting...');
                console.log('ℹ️  This workflow will activate automatically after next deployment.');
                return;
              }

              console.log('⏳ Pending release found:');
              console.log('   Version:', versionData.pendingVersion);
              console.log('   Build Number:', versionData.pendingBuildNumber);
              console.log('   Uploaded At:', versionData.uploadedAt);

              // STEP 2: Check Play Store API for approval status
              console.log('\n📱 Checking Play Store API...');

              const playStoreAuth = JSON.parse(process.env.PLAY_STORE_CREDENTIALS);
              const auth = new google.auth.GoogleAuth({
                credentials: playStoreAuth,
                scopes: ['https://www.googleapis.com/auth/androidpublisher'],
              });

              const androidPublisher = google.androidpublisher({
                version: 'v3',
                auth: auth,
              });

              const packageName = 'com.invtracker.inv_tracker';

              // Create an edit to query tracks
              const editResponse = await androidPublisher.edits.insert({
                packageName: packageName,
              });

              const editId = editResponse.data.id;

              // Get production track info (matching your deploy workflow)
              const trackResponse = await androidPublisher.edits.tracks.get({
                packageName: packageName,
                editId: editId,
                track: 'production',  // Matches your deploy workflow
              });

              // Delete the edit (we're just reading)
              await androidPublisher.edits.delete({
                packageName: packageName,
                editId: editId,
              });

              const releases = trackResponse.data.releases || [];

              if (releases.length === 0) {
                console.log('⚠️  No releases found in production track');
                console.log('ℹ️  This is expected during Google Play review period.');
                console.log('ℹ️  Releases appear in production track AFTER approval, not during review.');
                console.log('⏳ Keeping pending flag active. Will check again next hour...');
                return;
              }

              // Get the latest release
              const latestRelease = releases[0];
              const versionCode = latestRelease.versionCodes?.[0];
              const status = latestRelease.status;  // 'completed', 'inProgress', 'draft', 'halted'

              console.log('📋 Latest Play Store release:');
              console.log('   Version Code:', versionCode);
              console.log('   Status:', status);
              console.log('   Name:', latestRelease.name);

              // STEP 3: Check if this is our pending version and if it's approved
              // Convert both to numbers to avoid type mismatch (string vs number)
              const isPendingVersion = Number(versionCode) === Number(versionData.pendingBuildNumber);
              const isApproved = status === 'completed';

              // Check if pending release is stale (older than 7 days)
              const uploadedAt = new Date(versionData.uploadedAt);
              const now = new Date();
              const hoursSinceUpload = (now - uploadedAt) / (1000 * 60 * 60);
              const isStale = hoursSinceUpload > 168; // 7 days

              if (!isPendingVersion) {
                console.log('ℹ️  Play Store version does not match pending version');
                console.log('   Expected:', versionData.pendingBuildNumber);
                console.log('   Found:', versionCode);

                // If Play Store has a NEWER version, clear the pending flag
                if (Number(versionCode) > Number(versionData.pendingBuildNumber)) {
                  console.log('🧹 Play Store has newer version - clearing outdated pending flag...');

                  await db.collection('app_config').doc('version_info').update({
                    pendingRelease: false,
                  });

                  console.log('✅ Outdated flag cleared!');
                  console.log('💡 Note: You may want to manually update latestVersion/latestBuildNumber if needed.');
                  return;
                }

                // If pending for >7 days, clear as stale
                if (isStale) {
                  console.log(`⚠️  Pending release is stale (${Math.floor(hoursSinceUpload / 24)} days old)`);
                  console.log('🧹 Clearing stale pending flag...');

                  await db.collection('app_config').doc('version_info').update({
                    pendingRelease: false,
                  });

                  console.log('✅ Stale flag cleared!');
                  return;
                }

                console.log('⏳ Will check again next hour...');
                return;
              }

              if (!isApproved) {
                // Check if stale even though version matches
                if (isStale) {
                  console.log(`⚠️  Version still under review after ${Math.floor(hoursSinceUpload / 24)} days`);
                  console.log('🧹 Clearing stale pending flag...');

                  await db.collection('app_config').doc('version_info').update({
                    pendingRelease: false,
                  });

                  console.log('✅ Stale flag cleared!');
                  console.log('💡 Please check Play Store Console manually.');
                  return;
                }

                console.log('⏳ Version is still under review');
                console.log('   Status:', status);
                console.log(`   Time since upload: ${Math.floor(hoursSinceUpload)} hours`);
                console.log('⏳ Will check again next hour...');
                return;
              }

              // STEP 4: Version is approved! Update Firestore with rollout delay
              console.log('\n🎉 VERSION APPROVED! Updating Firestore...');

              const approvalTime = new Date().toISOString();

              // Rollout delay: 2 hours (average time for production track propagation)
              // Production releases typically take 1-3 hours to propagate globally
              const rolloutDelayMinutes = 120;
              const releaseDate = new Date(Date.now() + (rolloutDelayMinutes * 60 * 1000));

              const whatsNew = latestRelease.releaseNotes?.[0]?.text || '- Bug fixes and improvements';

              // Update Firestore immediately with future releaseDate
              // App will check releaseDate and only show dialog after delay
              await db.collection('app_config').doc('version_info').update({
                latestVersion: versionData.pendingVersion,
                latestBuildNumber: versionData.pendingBuildNumber,
                releaseDate: releaseDate.toISOString(),  // 30 minutes from now
                updateMessage: 'New version available!',
                whatsNew: whatsNew,
                pendingRelease: false,  // Clear pending flag
                lastApprovedAt: approvalTime,
              });

              console.log('\n✅ Firestore updated successfully!');
              console.log('   Version:', versionData.pendingVersion);
              console.log('   Build Number:', versionData.pendingBuildNumber);
              console.log('   Approval Time:', approvalTime);
              console.log('   Release Date:', releaseDate.toISOString());
              console.log(`   ⏰ Users will see update dialog after ${rolloutDelayMinutes} minutes (${releaseDate.toLocaleTimeString()})`);
              console.log('   💡 App checks releaseDate before showing dialog');

              // Set output for Slack notification
              fs.writeFileSync(
                process.env.GITHUB_OUTPUT,
                `updated=true\nversion=${versionData.pendingVersion}\nbuild=${versionData.pendingBuildNumber}\n`,
                { flag: 'a' }
              );

            } catch (error) {
              console.error('❌ Error:', error.message);
              if (error.response) {
                console.error('Response:', JSON.stringify(error.response.data, null, 2));
              }
              // Don't exit with error - let it retry next hour
              console.log('\n⚠️  Will retry next hour...');
            }
          }

          checkPlayStoreStatus();
          EOF
      
      # Notify Slack if Firestore was updated
      - name: Notify Slack - Version Updated
        if: steps.check_status.outputs.updated == 'true'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🎉 Firestore Version Updated!",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Version:*\n${{ steps.check_status.outputs.version }}"},
                    {"type": "mrkdwn", "text": "*Build:*\n${{ steps.check_status.outputs.build }}"}
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Play Store version was approved and Firestore has been automatically updated. Users will now see the update dialog!"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

