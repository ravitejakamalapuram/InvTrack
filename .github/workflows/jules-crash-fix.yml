name: Jules AI Crash Fix Automation

# Automatically fetch crashes from Firebase Crashlytics and create Jules AI sessions to fix them
# Jules will analyze crashes, implement fixes, and create PRs automatically

on:
  # Run every hour to check for new crashes
  schedule:
    - cron: '0 * * * *'
  
  # Manual trigger with customizable parameters
  workflow_dispatch:
    inputs:
      crash_limit:
        description: 'Number of top crashes to analyze (1-10)'
        required: false
        default: '5'
        type: choice
        options:
          - '1'
          - '3'
          - '5'
          - '10'
      min_affected_users:
        description: 'Minimum affected users to process crash'
        required: false
        default: 1
        type: number
      report_type:
        description: 'Crashlytics report type'
        required: false
        default: 'topIssues'
        type: choice
        options:
          - 'topIssues'
          - 'topVersions'
      issue_error_types:
        description: 'Filter crashes by fatality (comma-separated: FATAL, NON_FATAL, ANR)'
        required: false
        default: 'FATAL,NON_FATAL,ANR'
        type: string
      dry_run:
        description: 'Run pipeline in Dry Run mode (does not create Jules sessions or PRs)'
        required: false
        default: false
        type: boolean

env:
  FIREBASE_PROJECT_ID: invtracker-b19d1
  # Jules source name should be in format: sources/github-owner-repo
  # Get this by running: curl -H "x-goog-api-key: $JULES_API_KEY" https://jules.googleapis.com/v1alpha/sources

jobs:
  fetch-and-fix-crashes:
    name: Fetch Crashes and Create Jules Sessions
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write  # To create tracking issues
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Node.js for Firebase CLI
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Firebase CLI
        run: |
          # Check if Firebase CLI is already installed on self-hosted runner
          if command -v firebase &> /dev/null; then
            echo "✅ Firebase CLI already installed: $(firebase --version)"
          else
            echo "Installing Firebase CLI..."
            npm install -g firebase-tools@latest
          fi
          firebase --version
      
      - name: Authenticate Firebase with Service Account
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: |
          # Use Firebase service account for Crashlytics API access
          # Service account has required permissions for Crashlytics REST API
          echo "Setting up Firebase service account authentication..."

          # Write service account credentials to temporary file
          echo "$FIREBASE_CREDENTIALS" > /tmp/firebase-service-account.json

          # Set environment variable for Firebase SDK (Node.js will use this)
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-service-account.json

          # Install Google Auth Library locally (for OAuth2 token generation)
          npm install google-auth-library

          echo "✅ Firebase service account configured"
          echo "✅ Google Auth Library installed"
      
      - name: Fetch Crashlytics Top Issues
        id: fetch_crashes
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-service-account.json
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          CRASH_LIMIT: ${{ github.event.inputs.crash_limit || '5' }}
          MIN_USERS: ${{ github.event.inputs.min_affected_users || '1' }}
          REPORT_TYPE: ${{ github.event.inputs.report_type || 'topIssues' }}
          ISSUE_ERROR_TYPES: ${{ github.event.inputs.issue_error_types || 'FATAL,NON_FATAL,ANR' }}
        run: |
          # Fetch crashes using service account authenticated Crashlytics API
          bash .github/scripts/fetch-crashlytics-data.sh
      
      - name: Create Jules Sessions for Crashes
        id: create_sessions
        if: steps.fetch_crashes.outputs.crash_count > 0
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          JULES_SOURCE_NAME: ${{ secrets.JULES_SOURCE_NAME }}
          CRASHES_FILE: crashlytics_data.json
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-service-account.json
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          # Create Jules AI sessions for each crash
          bash .github/scripts/create-jules-sessions.sh
      
      - name: Monitor Jules Sessions
        id: monitor_sessions
        if: steps.create_sessions.outputs.session_count > 0
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          MAX_WAIT_MINUTES: 60
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-service-account.json
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          # Poll Jules sessions until completion or timeout
          bash .github/scripts/monitor-jules-sessions.sh
      
      - name: Create Summary Issue
        if: always() && steps.create_sessions.outputs.session_count > 0
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create GitHub issue with summary of Jules sessions
          bash .github/scripts/create-summary-issue.sh
      
      - name: Upload Session Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jules-crash-fix-logs
          path: |
            crashlytics_data.json
            jules_sessions.json
            session_summary.md
          retention-days: 30
