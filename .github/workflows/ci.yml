name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, ready_for_review, synchronize]
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-checks:
    name: Code Quality and Tests
    if: |
      github.event_name == 'push' || 
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    uses: ravitejakamalapuram/.github-workflows-shared/.github/workflows/flutter-ci.yml@v1.1.8
    with:
      run-l10n: true
      dry-run-build: true
      slack-notify-failure: true
      slack-app-name: 'InvTrack (PR Checks)'
      exclude-tags: 'golden'
      coverage: 'false'
      fatal-warnings: 'true'
      fatal-infos: 'false'
      architecture-checks: 'true'
      check-api-in-widgets: 'true'
      check-navigation-in-domain: 'true'
      security-checks: 'true'
      runner-type: 'self-hosted'
    secrets:
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
