name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, ready_for_review, synchronize]
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-checks:
    name: Code Quality and Tests
    runs-on: self-hosted
    timeout-minutes: 30
    if: |
      github.event_name == 'push' || 
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false)

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          clean: true

      - name: Flutter Setup
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/flutter/setup@v1.0.2
        with:
          flutter-channel: 'stable'
          cache-pub: 'true'
          auto-fix-corruption: 'true'

      - name: Generate Localizations
        run: flutter gen-l10n

      - name: Run Analyzer with Security & Architecture Checks
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/flutter/analyze@v1.0.2
        with:
          fatal-warnings: 'true'
          fatal-infos: 'false'
          architecture-checks: 'true'
          check-api-in-widgets: 'true'
          check-navigation-in-domain: 'true'
          security-checks: 'true'

      - name: Run Tests
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/flutter/test@v1.0.2
        with:
          exclude-tags: 'golden'
          coverage: 'false'

      - name: Build App Bundle (Dry Run)
        run: |
          echo "🔍 Building App Bundle (Dry Run)..."
          flutter build appbundle --debug

      - name: Summary
        if: success()
        run: echo "✅ All checks passed - ready for deployment"

      - name: Notify Slack of Failure
        if: failure()
        uses: ravitejakamalapuram/.github-workflows-shared/composite-actions/common/slack-notify@v1.0.2
        with:
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: ${{ job.status }}
          app-name: 'InvTrack (PR Checks)'

